openapi: 3.0.3
info:
  title: Verisite Reimbursement API
  version: 0.1.0
paths:
  /reimbursements:
    get:
      summary: List reimbursement requests for the signed-in employee
      description: Returns requests ordered from newest to oldest.
      operationId: listReimbursements
      responses:
        '200':
          description: Reimbursement requests returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReimbursementListResponse'
    post:
      summary: Submit a reimbursement request as an employee
      description: The request references receipt files uploaded earlier through the files API.
      operationId: submitReimbursement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitReimbursementRequest'
      responses:
        '201':
          description: Reimbursement request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReimbursementRequest'
        '422':
          description: Invalid reimbursement payload
  /reimbursements/{requestId}/cancel:
    post:
      summary: Cancel a reimbursement request while it is still pending review
      operationId: cancelReimbursement
      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Reimbursement request canceled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReimbursementRequest'
        '404':
          description: Reimbursement request not found
        '409':
          description: Reimbursement request cannot be canceled
  /admin/reimbursements/{requestId}/approve:
    post:
      summary: Approve a reimbursement request as an admin reviewer
      operationId: approveReimbursement
      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveReimbursementRequest'
      responses:
        '200':
          description: Reimbursement request approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReimbursementRequest'
  /admin/reimbursements/{requestId}/reject:
    post:
      summary: Reject a reimbursement request as an admin reviewer
      operationId: rejectReimbursement
      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectReimbursementRequest'
      responses:
        '200':
          description: Reimbursement request rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReimbursementRequest'
  /admin/reimbursements/{requestId}/payment:
    post:
      summary: Attach a generic payment reference to an approved reimbursement
      operationId: attachReimbursementPaymentReference
      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachPaymentReferenceRequest'
      responses:
        '200':
          description: Payment reference attached to the reimbursement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReimbursementRequest'
components:
  schemas:
    SubmitReimbursementRequest:
      type: object
      required:
        - title
        - amount
        - attachments
      properties:
        title:
          type: string
        amount:
          type: number
          format: double
          minimum: 0.01
        notes:
          type: string
          default: ''
        attachments:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ReimbursementAttachment'
    ApproveReimbursementRequest:
      type: object
      required:
        - reviewerId
      properties:
        reviewerId:
          type: string
    RejectReimbursementRequest:
      type: object
      required:
        - reviewerId
        - rejectionReason
      properties:
        reviewerId:
          type: string
        rejectionReason:
          type: string
    AttachPaymentReferenceRequest:
      type: object
      required:
        - paymentReference
      properties:
        paymentReference:
          type: string
    ReimbursementAttachment:
      type: object
      required:
        - fileId
        - source
      properties:
        fileId:
          type: string
        source:
          type: string
          enum:
            - gallery
            - camera
    ReimbursementRequest:
      type: object
      required:
        - id
        - employeeId
        - title
        - amount
        - submittedAt
        - status
        - notes
        - attachments
      properties:
        id:
          type: string
        employeeId:
          type: string
        title:
          type: string
        amount:
          type: number
          format: double
        submittedAt:
          type: string
          format: date-time
        status:
          type: string
          enum:
            - pending
            - approved
            - rejected
            - canceled
        attachments:
          type: array
          items:
            type: object
            required:
              - id
              - fileId
              - name
              - path
              - source
            properties:
              id:
                type: string
              fileId:
                type: string
              name:
                type: string
              path:
                type: string
              source:
                type: string
              provider:
                type: string
                enum:
                  - local
                  - aws
                  - google_drive
        notes:
          type: string
        reviewedBy:
          type: string
          nullable: true
        reviewedAt:
          type: string
          format: date-time
          nullable: true
        rejectionReason:
          type: string
          nullable: true
        paymentReference:
          type: string
          nullable: true
    ReimbursementListResponse:
      type: object
      required:
        - requests
      properties:
        requests:
          type: array
          items:
            $ref: '#/components/schemas/ReimbursementRequest'
