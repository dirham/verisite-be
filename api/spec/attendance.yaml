openapi: 3.0.3
info:
  title: Verisite Attendance API
  version: 0.1.0
paths:
  /attendance/clock-in:
    post:
      summary: Create a clock-in record for the signed-in employee
      operationId: recordClockIn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceEventSubmission'
      responses:
        '201':
          description: Clock-in recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceRecord'
  /attendance/clock-out:
    post:
      summary: Create a clock-out record for the signed-in employee
      operationId: recordClockOut
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceEventSubmission'
      responses:
        '201':
          description: Clock-out recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceRecord'
  /attendance/location-samples:
    post:
      summary: Submit periodic location samples for an active attendance session
      description: Used while the employee is clocked in to send location samples roughly every ten minutes.
      operationId: submitAttendanceLocationSamples
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceLocationSampleBatch'
      responses:
        '202':
          description: Location samples accepted
  /attendance/history:
    get:
      summary: Get attendance history for the signed-in employee
      description: Returns attendance records ordered from newest to oldest.
      operationId: getAttendanceHistory
      responses:
        '200':
          description: Attendance history returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceHistoryResponse'
components:
  schemas:
    AttendanceEventSubmission:
      type: object
      required:
        - occurredAt
        - timezone
        - location
      properties:
        occurredAt:
          type: string
          format: date-time
        timezone:
          type: string
          description: IANA timezone from the device at the time of the attendance event.
        location:
          $ref: '#/components/schemas/AttendanceLocationPoint'
        deviceSignal:
          $ref: '#/components/schemas/AttendanceDeviceSignal'
    AttendanceLocationSampleBatch:
      type: object
      required:
        - sessionId
        - samples
      properties:
        sessionId:
          type: string
          description: Active attendance session identifier created by clock-in.
        samples:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/AttendanceLocationSample'
    AttendanceLocationSample:
      type: object
      required:
        - capturedAt
        - timezone
        - location
      properties:
        capturedAt:
          type: string
          format: date-time
        timezone:
          type: string
        location:
          $ref: '#/components/schemas/AttendanceLocationPoint'
        deviceSignal:
          $ref: '#/components/schemas/AttendanceDeviceSignal'
    AttendanceLocationPoint:
      type: object
      required:
        - latitude
        - longitude
      properties:
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
        accuracyMeters:
          type: number
          format: double
          minimum: 0
        altitudeMeters:
          type: number
          format: double
        speedMetersPerSecond:
          type: number
          format: double
          minimum: 0
        headingDegrees:
          type: number
          format: double
          minimum: 0
          maximum: 360
        isMocked:
          type: boolean
          description: Device-provided mock or simulated location signal when available.
    AttendanceDeviceSignal:
      type: object
      properties:
        platform:
          type: string
          enum:
            - android
            - ios
        appState:
          type: string
          enum:
            - foreground
            - background
        batteryLevel:
          type: integer
          minimum: 0
          maximum: 100
        networkType:
          type: string
          enum:
            - wifi
            - cellular
            - offline
    AttendanceRecord:
      type: object
      required:
        - id
        - employeeId
        - type
        - occurredAt
      properties:
        id:
          type: string
        employeeId:
          type: string
        sessionId:
          type: string
          nullable: true
          description: Present for clock-in and matching clock-out events in the same attendance session.
        type:
          type: string
          enum:
            - clockIn
            - clockOut
        occurredAt:
          type: string
          format: date-time
        suspiciousReason:
          type: string
          nullable: true
          description: Present only when the system flags the event for review.
        location:
          $ref: '#/components/schemas/AttendanceLocationPoint'
    AttendanceHistoryResponse:
      type: object
      required:
        - records
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/AttendanceRecord'
