services:
  app:
    build:
      context: .
    container_name: verisite-be-app
    command: >
      sh -c "mix deps.get &&
             mix ecto.create &&
             mix ecto.migrate &&
             mix run priv/repo/seeds.exs &&
             mix phx.server"
    environment:
      MIX_ENV: dev
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
    ports:
      - '4000:4000'
    volumes:
      - .:/app
      - app_deps:/app/deps
      - app_build:/app/_build
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  test:
    build:
      context: .
    profiles:
      - test
    command: >
      sh -c "mix deps.get &&
             mix ecto.create &&
             mix ecto.migrate &&
             mix test"
    environment:
      MIX_ENV: test
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
    volumes:
      - .:/app
      - app_deps:/app/deps
      - app_build:/app/_build
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: verisite-be-postgres
    environment:
      POSTGRES_DB: verisite_be
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '15432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d verisite_be']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: verisite-be-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '19000:9000'
      - '19001:9001'
    volumes:
      - minio_data:/data

volumes:
  app_deps:
  app_build:
  postgres_data:
  minio_data:
